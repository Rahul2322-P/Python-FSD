{% extends 'base.html' %}

{% block title %}{{ title }} - EcoLearn Admin{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm border-0 border-top border-danger border-5">
            <div class="card-body p-5">
                <i class="bi bi-exclamation-triangle text-danger display-1 mb-3"></i>
                <h2 class="fw-bold text-dark mb-4">{{ title }}</h2>
                <p class="lead text-muted mb-5">Are you sure you want to delete <strong>"{{ obj.title }}"</strong>? This
                    action cannot be undone.</p>

                <form method="post" class="d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <a href="{% url 'custom_admin_dashboard' %}"
                        class="btn btn-outline-secondary px-4 fw-bold rounded-pill">Cancel</a>
                    <button type="submit" class="btn btn-danger px-5 fw-bold rounded-pill">Yes, Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
